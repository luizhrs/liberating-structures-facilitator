<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A free, open-source facilitation companion for Liberating Structures. No accounts, no data stored." />
    <title>LS Facilitator — Liberating Structures Companion</title>

    <!--
      Anti-FOUC: Apply saved theme and font size before CSS loads.
      This prevents the page flashing from one theme to another on load.
      Reads from localStorage — only display preferences, no personal data.
    -->
    <script>
      (function () {
        try {
          var p = JSON.parse(localStorage.getItem('ls-display') || '{}');
          var theme = p.theme || 'system';
          if (theme === 'system') {
            theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', theme);
          if (p.fontSize) {
            document.documentElement.style.setProperty('--font-scale', p.fontSize);
          }
        } catch (e) {}
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
